  <body>
    <!-- Flash prevention: apply stored theme before React mounts -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
          // Jelly mode flash prevention: apply stored jelly state before React mounts
          // Default to ON for new visitors (null = never set = first visit)
          var j = localStorage.getItem('jelly-mode');
          if (j === null || j === 'true') document.documentElement.classList.add('jelly-mode');
        } catch(e) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
